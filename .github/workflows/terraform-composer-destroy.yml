name: Terraform Destroy (Composer Dev)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Prevent overlapping runs on the same state
concurrency:
  group: terraform-composer3-state
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        shell: bash
        working-directory: ./terraform-composer3
    env:
      STATE_BUCKET: composer_dags_dev          # matches your current backend
      STATE_PREFIX: terraform/composer/dev     # matches your backend prefix
      TF_WORKSPACE: default
      STALE_LOCK_MINUTES: "20"
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: prj-aidataandanalytics-s-24362
          create_credentials_file: true
          export_environment_variables: true

      - name: Who am I
        run: |
          gcloud config set project prj-aidataandanalytics-s-24362
          gcloud auth list --filter=status:ACTIVE --format="value(account)"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      # R/W probe using gcloud storage (works with OIDC)
      - name: Test backend path read/write
        run: |
          echo "rw-test" | gcloud storage cp - gs://${STATE_BUCKET}/${STATE_PREFIX}/backend_rw_test
          gcloud storage ls gs://${STATE_BUCKET}/${STATE_PREFIX}/

      # Stale-lock cleanup (uses gcloud storage)
      - name: Check Terraform state lock in GCS
        run: |
          set -euo pipefail
          LOCK_URI="gs://${STATE_BUCKET}/${STATE_PREFIX}/${TF_WORKSPACE}.tflock"
          echo "Checking lock: ${LOCK_URI}"
          if gcloud storage ls "${LOCK_URI}" >/dev/null 2>&1; then
            META="$(gcloud storage ls -L "${LOCK_URI}")"
            echo "${META}"
            UPDATED="$(echo "${META}" | sed -n 's/ *Updated: *\(.*\)$/\1/p' | head -n1)"
            if [ -z "${UPDATED}" ]; then
              echo "Cannot read lock updated time; refusing to proceed."
              echo "If no run is active, clear the lock: gcloud storage rm ${LOCK_URI}"
              exit 1
            fi
            LOCK_TS="$(date -d "${UPDATED}" +%s)"
            NOW_TS="$(date +%s)"
            AGE_MIN=$(( (NOW_TS - LOCK_TS) / 60 ))
            echo "Lock age: ${AGE_MIN} min"
            if [ "${AGE_MIN}" -ge "${STALE_LOCK_MINUTES}" ]; then
              echo "Stale lock (> ${STALE_LOCK_MINUTES} min). Removing..."
              gcloud storage rm "${LOCK_URI}"
            else
              echo "Lock is fresh; destroy will wait using -lock-timeout."
            fi
          else
            echo "No lock object found."
          fi

      - name: Init
        run: terraform init -upgrade

      - name: Plan destroy
        run: terraform plan -destroy -var-file="environments/dev.tfvars" -lock-timeout=10m

      - name: Destroy
        run: terraform destroy -auto-approve -var-file="environments/dev.tfvars" -lock-timeout=20m