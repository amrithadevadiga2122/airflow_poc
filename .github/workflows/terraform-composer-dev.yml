name: Terraform CI/CD (Composer Dev)

on:
  push:
    branches:
      - main
    paths:
      - 'terraform-composer3/**'
      - '.github/workflows/terraform-composer-dev.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform-composer3/**'
      - '.github/workflows/terraform-composer-dev.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Plan & Apply (dev)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Verify dev.tfvars presence
        run: |
          ls -al terraform-composer3 || true
          ls -al terraform-composer3/environments || true
          if [ ! -f terraform-composer3/environments/dev.tfvars ]; then
            echo "ERROR: terraform-composer3/environments/dev.tfvars is missing in this commit."
            exit 1
          fi

      - name: Terraform Init
        run: terraform init -upgrade
        working-directory: terraform-composer3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform-composer3

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform-composer3

      - name: Terraform Plan (dev)
        run: terraform plan -var-file="environments/dev.tfvars" -out=tfplan.bin
        working-directory: terraform-composer3

      - name: Terraform Apply (dev)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: terraform apply -auto-approve tfplan.bin
        working-directory: terraform-composer3