# .github/workflows/terraform-composer-dev.yml
name: Terraform CI/CD (Composer Dev)

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-composer-dev.yml"
  push:
    branches: [ main ]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-composer-dev.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_file: environments/dev.tfvars

jobs:
  validate_plan:
    name: Validate & Plan (dev)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      # Authenticate to Google Cloud using Workload Identity Federation
      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        run: |
          terraform --version
          terraform init -upgrade

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (dev)
        run: terraform plan -var-file="${{ env.TF_VAR_file }}" -out=tfplan.bin

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: tfplan.bin

  apply:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: validate_plan
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: dev
    defaults:
      run:
        shell: bash
        working-directory: ./
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Download Plan Artifact (optional)
        id: download_plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: .
        continue-on-error: true

      - name: Ensure plan file exists (create if missing)
        run: |
          if [ ! -f tfplan.bin ]; then
            echo "tfplan.bin not found; generating a fresh plan..."
            terraform plan -var-file="${{ env.TF_VAR_file }}" -out=tfplan.bin
          else
            echo "Using downloaded plan artifact."
          fi

      - name: Terraform Apply (dev)
        run: terraform apply -auto-approve tfplan.bin
