name: Terraform CI/CD (Composer Dev)

on:
  push:
    branches:
      - main
    paths:
      - 'terraform-composer3/**'
      - '.github/workflows/terraform-composer-dev.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform-composer3/**'
      - '.github/workflows/terraform-composer-dev.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    name: Plan (dev)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Verify dev.tfvars presence
        run: |
          ls -al terraform-composer3 || true
          ls -al terraform-composer3/environments || true
          if [ ! -f terraform-composer3/environments/dev.tfvars ]; then
            echo "ERROR: terraform-composer3/environments/dev.tfvars is missing in this commit."
            exit 1
          fi

      - name: Debug variables.tf content
        run: |
          echo "Commit: $GITHUB_SHA"
          echo "Path: variables.tf"
          nl -ba variables.tf | sed -n '1,40p'

      - name: Terraform Init
        run: terraform init -upgrade
        working-directory: terraform-composer3

      - name: Terraform Format Check
        #run: terraform fmt -check -recursive
        run: terraform fmt -recursive
        working-directory: terraform-composer3

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform-composer3

      - name: Terraform Plan (dev)
        run: terraform plan -var-file="environments/dev.tfvars" -out=tfplan.bin
        working-directory: terraform-composer3

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: terraform-composer3/tfplan.bin

  apply:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Verify dev.tfvars presence
        run: |
          if [ ! -f terraform-composer3/environments/dev.tfvars ]; then
            echo "ERROR: terraform-composer3/environments/dev.tfvars is missing in this commit."
            exit 1
          fi

      - name: Terraform Init
        run: terraform init -upgrade
        working-directory: terraform-composer3

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: terraform-composer3

      - name: Ensure plan exists (create if missing)
        run: |
          if [ ! -f tfplan.bin ]; then
            echo "tfplan.bin not found; generating a fresh plan..."
            terraform plan -var-file="environments/dev.tfvars" -out=tfplan.bin
          fi
        working-directory: terraform-composer3

      - name: Who am I (active identity)
        run: |
          echo "Active account:"
          gcloud auth list --filter=status:ACTIVE --format="value(account)"
          echo "Project config:"
          gcloud config list core/project
          echo "Project number:"
          gcloud projects describe prj-aidataandanalytics-s-24362 --format="value(projectNumber)"
      
      - name: Check Service Usage access
        run: |
          echo "List enabled services (should succeed if you have access):"
          gcloud services list --enabled --project prj-aidataandanalytics-s-24362

      - name: Terraform Apply (dev)
        run: terraform apply -auto-approve tfplan.bin
        working-directory: terraform-composer3