name: Terraform CI/CD (Composer Dev)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform-composer3/**'
      - '.github/workflows/terraform-dev.yml'
  push:
    branches:
      - main
    paths:
      - 'terraform-composer3/**'
      - '.github/workflows/terraform-dev.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    name: Plan (dev)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform-composer3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify dev.tfvars is present
        run: |
          ls -al
          ls -al environments || true
          test -f environments/dev.tfvars || (echo "ERROR: terraform-composer3/environments/dev.tfvars is missing"; exit 1)

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'

      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (dev)
        run: terraform plan -var-file='environments/dev.tfvars' -out=tfplan.bin

  apply:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: dev
    defaults:
      run:
        shell: bash
        working-directory: ./terraform-composer3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify dev.tfvars is present
        run: test -f environments/dev.tfvars || (echo "ERROR: terraform-composer3/environments/dev.tfvars is missing"; exit 1)

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'

      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        run: terraform init -upgrade

      # Re-plan during apply for simplicity
      - name: Terraform Apply (dev)
        run: terraform apply -auto-approve -var-file='environments/dev.tfvars'