name: Terraform CI/CD (Composer Dev)

on:
  push:
    branches:
      - main
    paths:
      - 'terraform-composer3/**'
      - '.github/workflows/terraform-composer-dev.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform-composer3/**'
      - '.github/workflows/terraform-composer-dev.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    name: Plan (dev)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Verify dev.tfvars presence
        run: |
          ls -al terraform-composer3
          ls -al terraform-composer3/environments || true
          test -f terraform-composer3/environments/dev.tfvars || (echo "ERROR: terraform-composer3/environments/dev.tfvars missing"; exit 1)

      - name: Terraform Init
        run: terraform init -upgrade
        working-directory: terraform-composer3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform-composer3

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform-composer3

      - name: Terraform Plan (dev)
        run: terraform plan -var-file="environments/dev.tfvars" -out=tfplan.bin
        working-directory: terraform-composer3

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: terraform-composer3/tfplan.bin

  apply:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Verify dev.tfvars presence
        run: test -f terraform-composer3/environments/dev.tfvars || (echo "ERROR: terraform-composer3/environments/dev.tfvars missing"; exit 1)

      - name: Terraform Init
        run: terraform init -upgrade
        working-directory: terraform-composer3

      - name: Download Plan Artifact (optional)
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: terraform-composer3
        continue-on-error: true

      - name: Ensure plan exists (create if missing)
        run: |
          if [ ! -f tfplan.bin ]; then
            terraform plan -var-file="environments/dev.tfvars" -out=tfplan.bin
          fi
        working-directory: terraform-composer3

      - name: Terraform Apply (dev)
        run: terraform apply -auto-approve tfplan.bin
        working-directory: terraform-composer3