name: Build Provider Bundle (google/google-beta)

on:
  workflow_dispatch:
    inputs:
      min_major_minor:
        description: "Minimum major.minor to consider (e.g., 5.60)"
        default: "5.60"
        required: true

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: prj-aidataandanalytics-s-24362
  BUNDLE_BUCKET: tf-provider-bundle-prj-aidataandanalytics

jobs:
  build_bundle:
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      found_version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Ensure bundle bucket exists
        run: |
          if ! gcloud storage buckets describe gs://${BUNDLE_BUCKET} >/dev/null 2>&1; then
            gcloud storage buckets create gs://${BUNDLE_BUCKET} --location=US
          fi

      - name: Resolve highest common provider version from releases
        id: resolve
        run: |
          set -e
          MIN="${{ inputs.min_major_minor }}"
          echo "Minimum major.minor: $MIN"
          GOOGLE_INDEX=$(curl -fsSL https://releases.hashicorp.com/terraform-provider-google/index.json)
          BETA_INDEX=$(curl -fsSL https://releases.hashicorp.com/terraform-provider-google-beta/index.json)
          echo "$GOOGLE_INDEX" > google_index.json
          echo "$BETA_INDEX" > google_beta_index.json

          # Get all versions for each provider
          GOOGLE_VERSIONS=$(jq -r '.versions[].version' google_index.json | sort -V)
          BETA_VERSIONS=$(jq -r '.versions[].version' google_beta_index.json | sort -V)

          # Intersect the two sets, filter >= MIN, sort descending, take highest
          COMMON=$(comm -12 <(echo "$GOOGLE_VERSIONS") <(echo "$BETA_VERSIONS") | awk -v min="$MIN" 'function ver(v){split(v,a,"."); return a[1]"."a[2]} ver($0)>=min' | sort -V -r | head -n1)

          if [ -z "$COMMON" ]; then
            echo "No common google/google-beta version found >= $MIN" >&2
            exit 1
          fi

          echo "Resolved common version: $COMMON"
          echo "version=$COMMON" >> "$GITHUB_OUTPUT"

      - name: Download google/google-beta provider zips (linux_amd64)
        run: |
          set -e
          V="${{ steps.resolve.outputs.version }}"
          mkdir -p bundle/plugins
          cd bundle/plugins
          curl -fL -o terraform-provider-google_${V}_linux_amd64.zip \
            "https://releases.hashicorp.com/terraform-provider-google/${V}/terraform-provider-google_${V}_linux_amd64.zip"
          curl -fL -o terraform-provider-google-beta_${V}_linux_amd64.zip \
            "https://releases.hashicorp.com/terraform-provider-google-beta/${V}/terraform-provider-google-beta_${V}_linux_amd64.zip"
          unzip -o terraform-provider-google_${V}_linux_amd64.zip
          unzip -o terraform-provider-google-beta_${V}_linux_amd64.zip

          # Build registry-style tree expected by -plugin-dir
          mkdir -p registry.terraform.io/hashicorp/google/${V}/linux_amd64
          mkdir -p registry.terraform.io/hashicorp/google-beta/${V}/linux_amd64
          mv terraform-provider-google_* registry.terraform.io/hashicorp/google/${V}/linux_amd64/ || true
          mv terraform-provider-google-beta_* registry.terraform.io/hashicorp/google-beta/${V}/linux_amd64/ || true
          echo "Registry tree:"
          find registry.terraform.io -type f -maxdepth 6 | sort

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Generate lock file offline using -plugin-dir
        run: |
          set -e
          mkdir -p bundle/lock
          V="${{ steps.resolve.outputs.version }}"
          cat > bundle/lock/versions.tf <<EOF
          terraform {
            required_providers {
              google = {
                source  = "hashicorp/google"
                version = "${V}"
              }
              google-beta = {
                source  = "hashicorp/google-beta"
                version = "${V}"
              }
            }
          }
          EOF
          cd bundle/lock
          terraform init -plugin-dir="$GITHUB_WORKSPACE/bundle/plugins" -upgrade
          cp .terraform.lock.hcl "$GITHUB_WORKSPACE/bundle/.terraform.lock.hcl"

      - name: Upload bundle and lock to GCS
        run: |
          set -e
          V="${{ steps.resolve.outputs.version }}"
          DEST="gs://${BUNDLE_BUCKET}/bundles/google-${V}"
          gcloud storage rsync -r "$GITHUB_WORKSPACE/bundle/plugins/registry.terraform.io" "${DEST}/registry.terraform.io"
          gcloud storage cp "$GITHUB_WORKSPACE/bundle/.terraform.lock.hcl" "${DEST}/.terraform.lock.hcl"
          echo "Bundle: ${DEST}/registry.terraform.io"
          echo "Lock:   ${DEST}/.terraform.lock.hcl"