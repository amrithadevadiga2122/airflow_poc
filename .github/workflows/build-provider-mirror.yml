name: Build Provider Mirror (google/google-beta)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROVIDER_VERSION: "5.63.0"                         # provider version to mirror
  MIRROR_BUCKET: "tf-provider-mirror-prj-aidataandanalytics"  # change if different

jobs:
  build_mirror:
    runs-on: ubuntu-latest
    environment: dev   # keep if your GCP secrets are env-scoped
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: prj-aidataandanalytics-s-24362
          create_credentials_file: true
          export_environment_variables: true

      - name: Prepare provider lock (linux_amd64)
        run: |
          mkdir -p provider_lock
          cat > provider_lock/versions.tf <<EOF
          terraform {
            required_providers {
              google = {
                source  = "hashicorp/google"
                version = "${{ env.PROVIDER_VERSION }}"
              }
              google-beta = {
                source  = "hashicorp/google-beta"
                version = "${{ env.PROVIDER_VERSION }}"
              }
            }
          }
          EOF
          cd provider_lock
          terraform init
          # Lock for Cloud Shell/linux_amd64
          terraform providers lock -platform=linux_amd64

      - name: Mirror providers locally
        run: |
          mkdir -p provider-mirror
          cd provider_lock
          terraform providers mirror ../provider-mirror
          echo "Mirror contents:"
          find ../provider-mirror -maxdepth 4 -type f | sort

      - name: Upload mirror to GCS
        run: |
          if ! gcloud storage buckets describe gs://composer_dags_dev >/dev/null 2>&1; then
            gcloud storage buckets create gs://composer_dags_dev --location=US
          fi
          gsutil -m rsync -r provider-mirror gs://composer_dags_dev
          # If your org allows public read, uncomment:
          # gsutil iam ch allUsers:objectViewer gs://composer_dags_dev

      - name: Upload lock file
        run: |
          gsutil cp provider_lock/.terraform.lock.hcl gs://composer_dags_dev/locks/.terraform.lock.hcl