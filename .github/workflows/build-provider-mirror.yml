name: Build Provider Bundle (google/google-beta)

on:
  workflow_dispatch:
    inputs:
      provider_version:
        description: Provider version (supports storage_config)
        default: "5.63.0"
        required: true

permissions:
  contents: read
  id-token: write

env:
  PROVIDER_VERSION: ${{ inputs.provider_version }}
  BUNDLE_BUCKET: tf-provider-bundle-prj-aidataandanalytics   # change if different
  PROJECT_ID: prj-aidataandanalytics-s-24362

jobs:
  build_bundle:
    runs-on: ubuntu-latest
    environment: dev  # if your secrets are env-scoped
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Ensure bundle bucket exists
        run: |
          if ! gcloud storage buckets describe gs://${BUNDLE_BUCKET} >/dev/null 2>&1; then
            gcloud storage buckets create gs://${BUNDLE_BUCKET} --location=US
          fi

      - name: Download google/google-beta provider zips (linux_amd64)
        run: |
          set -e
          mkdir -p bundle/plugins
          cd bundle/plugins
          curl -fL -o terraform-provider-google_${PROVIDER_VERSION}_linux_amd64.zip \
            https://releases.hashicorp.com/terraform-provider-google/${PROVIDER_VERSION}/terraform-provider-google_${PROVIDER_VERSION}_linux_amd64.zip
          curl -fL -o terraform-provider-google-beta_${PROVIDER_VERSION}_linux_amd64.zip \
            https://releases.hashicorp.com/terraform-provider-google-beta/${PROVIDER_VERSION}/terraform-provider-google-beta_${PROVIDER_VERSION}_linux_amd64.zip
          unzip -o terraform-provider-google_${PROVIDER_VERSION}_linux_amd64.zip
          unzip -o terraform-provider-google-beta_${PROVIDER_VERSION}_linux_amd64.zip
          ls -l

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Generate lock file using -plugin-dir (offline)
        run: |
          set -e
          mkdir -p bundle/lock
          cat > bundle/lock/versions.tf <<EOF
          terraform {
            required_providers {
              google = {
                source  = "hashicorp/google"
                version = "${PROVIDER_VERSION}"
              }
              google-beta = {
                source  = "hashicorp/google-beta"
                version = "${PROVIDER_VERSION}"
              }
            }
          }
          EOF
          cd bundle/lock
          terraform init -plugin-dir="$GITHUB_WORKSPACE/bundle/plugins" -upgrade
          cp .terraform.lock.hcl "$GITHUB_WORKSPACE/bundle/.terraform.lock.hcl"

      - name: Upload bundle and lock to GCS
        run: |
          set -e
          DEST="gs://${BUNDLE_BUCKET}/bundles/google-${PROVIDER_VERSION}"
          gcloud storage rsync -r "$GITHUB_WORKSPACE/bundle/plugins" "${DEST}/plugins"
          gcloud storage cp "$GITHUB_WORKSPACE/bundle/.terraform.lock.hcl" "${DEST}/.terraform.lock.hcl"
          echo "Bundle: ${DEST}/plugins"
          echo "Lock:   ${DEST}/.terraform.lock.hcl"