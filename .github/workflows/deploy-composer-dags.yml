name: Deploy Airflow DAGs to Cloud Composer

on:
  push:
    branches: [ main ]
    paths:
      - 'dags/**'
      - 'plugins/**'
      - '.github/workflows/deploy-composer-dags.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'dags/**'
      - 'plugins/**'
  workflow_dispatch:
    inputs:
      run_dag_tests:
        description: 'Run airflow dags test for each DAG (experimental)'
        required: false
        default: 'false'

concurrency:
  group: deploy-composer-dags
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint DAGs
        run: |
          flake8 dags || true

  validate:
    runs-on: ubuntu-latest
    env:
      # Set this to match your Composer Airflow version (Settings > Variables)
      AIRFLOW_VERSION: ${{ vars.AIRFLOW_VERSION || '2.7.3' }}
      PYTHON_VERSION: '3.11'
      RUN_DAG_TESTS: ${{ inputs.run_dag_tests || vars.RUN_DAG_TESTS || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Apache Airflow (use constraints to match version)
        shell: bash
        run: |
          set -euo pipefail
          CONSTRAINTS_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          python -m pip install --upgrade pip
          pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINTS_URL}"

      - name: Install DAG dependencies (optional)
        if: hashFiles('composer-packages.txt') != '' || hashFiles('requirements.txt') != ''
        run: |
          # Prefer composer-packages.txt if present, otherwise requirements.txt
          if [ -f composer-packages.txt ]; then
            pip install -r composer-packages.txt || true
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          fi

      - name: Validate DAG imports (fail on import errors)
        shell: bash
        run: |
          python - <<'PY'
          import sys
          from airflow.models import DagBag
          dagbag = DagBag(dag_folder='dags', include_examples=False)
          if dagbag.import_errors:
              print("DAG import errors detected:\n")
              for mod, err in dagbag.import_errors.items():
                  print(f"- {mod}:\n{err}\n")
              sys.exit(1)
          else:
              print(f"OK: {len(dagbag.dags)} DAGs imported successfully: {sorted(dagbag.dags.keys())}")
          PY

      - name: OPTIONAL - Run 'airflow dags test' for each DAG
        if: ${{ env.RUN_DAG_TESTS == 'true' }}
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/dags
        shell: bash
        run: |
          set -euo pipefail
          # Initialize Airflow DB for local CLI testing
          airflow db init
          # List DAG IDs via DagBag to avoid loading examples
          DAG_IDS=$(python - <<'PY'
          from airflow.models import DagBag
          print(' '.join(sorted(DagBag('dags', include_examples=False).dags.keys())))
          PY
          )
          echo "Testing DAGs: $DAG_IDS"
          for d in $DAG_IDS; do
            echo "\n=== airflow dags test $d ==="
            # Use a fixed execution date in the past; adjust if your DAG relies on specific dates
            airflow dags test "$d" 2024-01-01T00:00:00 --subdir dags || exit 1
          done

  deploy:
    needs: [lint, validate]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      COMPOSER_ENV: ${{ vars.COMPOSER_ENV }}
      DAG_SUBFOLDER: ${{ vars.DAG_SUBFOLDER || 'airflow_poc' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          token_format: 'access_token'

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Get Cloud Composer storage prefixes
        id: composer
        shell: bash
        run: |
          set -euo pipefail
          DAG_PREFIX=$(gcloud composer environments describe "$COMPOSER_ENV" --location "$GCP_REGION" --format='value(config.dagGcsPrefix)')
          PLUGINS_PREFIX=$(gcloud composer environments describe "$COMPOSER_ENV" --location "$GCP_REGION" --format='value(config.pluginsGcsPrefix)')
          if [ -z "$DAG_PREFIX" ] || [ "$DAG_PREFIX" = "None" ]; then
            echo "Environment not ready: dagGcsPrefix is empty/None. Aborting." >&2
            exit 1
          fi
          echo "dag=$DAG_PREFIX" >> "$GITHUB_OUTPUT"
          echo "plugins=$PLUGINS_PREFIX" >> "$GITHUB_OUTPUT"

      - name: Show locations
        run: |
          echo "DAGs will be uploaded to: ${{ steps.composer.outputs.dag }}/${{ env.DAG_SUBFOLDER }}"
          echo "Plugins will be uploaded to: ${{ steps.composer.outputs.plugins }}/${{ env.DAG_SUBFOLDER }}"

      - name: Stamp deployment metadata
        if: hashFiles('dags/**') != ''
        shell: bash
        run: |
          mkdir -p .ci
          cat > .ci/deploy.txt <<EOF
          repo=${{ github.repository }}
          sha=${{ github.sha }}
          ref=${{ github.ref }}
          actor=${{ github.actor }}
          when=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Sync plugins (optional)
        if: hashFiles('plugins/**') != ''
        shell: bash
        run: |
          gsutil -m rsync -r -x '(^|/)\..*|__pycache__/|(^|/)tests(/|$)' -d \
            plugins "${{ steps.composer.outputs.plugins }}/${{ env.DAG_SUBFOLDER }}"

      - name: Sync DAGs to Composer
        if: hashFiles('dags/**') != ''
        shell: bash
        run: |
          gsutil -m rsync -r -x '(^|/)\..*|__pycache__/|(^|/)tests(/|$)' -d \
            dags "${{ steps.composer.outputs.dag }}/${{ env.DAG_SUBFOLDER }}"
          gsutil cp .ci/deploy.txt "${{ steps.composer.outputs.dag }}/${{ env.DAG_SUBFOLDER }}/.deploy.txt"
