name: Deploy Airflow DAGs to Cloud Composer

on:
  push:
    branches: [ main ]
    paths:
      - 'dags/**'
      - 'plugins/**'
      - '.github/workflows/deploy-composer-dags.yml'
  workflow_dispatch:

concurrency:
  group: deploy-composer-dags
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint DAGs
      
        shell: bash
        run: |
          flake8 dags || true

  deploy:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      COMPOSER_ENV: ${{ vars.COMPOSER_ENV }}
      DAG_SUBFOLDER: ${{ vars.DAG_SUBFOLDER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Get Cloud Composer storage prefixes
        id: composer
        shell: bash
        run: |
          set -euo pipefail
          DAG_PREFIX=$(gcloud composer environments describe "$COMPOSER_ENV" --location "$GCP_REGION" --format='value(config.dagGcsPrefix)')
          PLUGINS_PREFIX=$(gcloud composer environments describe "$COMPOSER_ENV" --location "$GCP_REGION" --format='value(config.pluginsGcsPrefix)')
          if [ -z "$DAG_PREFIX" ] || [ "$DAG_PREFIX" = "None" ]; then
            echo "Environment not ready: dagGcsPrefix is empty/None. Ensure Composer env is RUNNING and properly provisioned, then retry." >&2
            exit 1
          fi
          echo "dag=$DAG_PREFIX" >> "$GITHUB_OUTPUT"
          echo "plugins=$PLUGINS_PREFIX" >> "$GITHUB_OUTPUT"

      - name: Resolve target subfolder
        id: path
        shell: bash
        run: |
          SUBFOLDER="${{ env.DAG_SUBFOLDER }}"
          if [ -z "$SUBFOLDER" ]; then SUBFOLDER="airflow_poc"; fi
          echo "subfolder=$SUBFOLDER" >> "$GITHUB_OUTPUT"

      - name: Stamp deployment metadata
        shell: bash
        run: |
          mkdir -p .ci
          printf "repo=%s\nsha=%s\nref=%s\nactor=%s\nwhen=%s\n" \
            "${{ github.repository }}" "${{ github.sha }}" "${{ github.ref }}" "${{ github.actor }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .ci/deploy.txt

      - name: Sync DAGs to Composer
        if: hashFiles('dags/**') != ''
        shell: bash
        run: |
          gsutil -m rsync -r -x '(^|/)\..*|__pycache__/|(^|/)tests(/|$)' -d \
            "dags" "${{ steps.composer.outputs.dag }}/${{ steps.path.outputs.subfolder }}"
          gsutil cp .ci/deploy.txt "${{ steps.composer.outputs.dag }}/${{ steps.path.outputs.subfolder }}/.deploy.txt"

      - name: Sync plugins (optional)
        if: hashFiles('plugins/**') != ''
        shell: bash
        run: |
          gsutil -m rsync -r -x '(^|/)\..*|__pycache__/' -d \
            "plugins" "${{ steps.composer.outputs.plugins }}/${{ steps.path.outputs.subfolder }}"

      - name: Show locations
        shell: bash
        run: |
          echo "DAGs uploaded to: ${{ steps.composer.outputs.dag }}/${{ steps.path.outputs.subfolder }}"
          echo "Plugins uploaded to: ${{ steps.composer.outputs.plugins }}/${{ steps.path.outputs.subfolder }}"