name: Deploy Airflow DAGs to Cloud Composer

on:
  push:
    branches: [ main ]
    paths:
      - 'dags/**'
      - 'plugins/**'
      - '.github/workflows/deploy-composer-dags.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'dags/**'
      - 'plugins/**'

# Prevent overlapping deployments
concurrency:
  group: deploy-composer-dags
  cancel-in-progress: true

# Required for GitHub OIDC authentication
permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint DAGs
        run: |
          # Adjust lints to your needs; non-blocking by default
          flake8 dags || true

  deploy:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      # Set these in GitHub Repository Variables (Settings > Variables)
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      GCP_REGION: ${{ vars.GCP_REGION }}          # e.g., us-central1
      COMPOSER_ENV: ${{ vars.COMPOSER_ENV }}      # e.g., airflowdev
      DAG_SUBFOLDER: ${{ vars.DAG_SUBFOLDER || 'airflow_poc' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          token_format: 'access_token'

      # If you cannot set up OIDC, use this alternative auth (less secure):
      # - name: Authenticate via service account key
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Get Cloud Composer storage prefixes
        id: composer
        run: |
          set -euo pipefail
          DAG_PREFIX=$(gcloud composer environments describe "$COMPOSER_ENV" --location "$GCP_REGION" --format='value(config.dagGcsPrefix)')
          PLUGINS_PREFIX=$(gcloud composer environments describe "$COMPOSER_ENV" --location "$GCP_REGION" --format='value(config.pluginsGcsPrefix)')
          if [ -z "$DAG_PREFIX" ] || [ "$DAG_PREFIX" = "None" ]; then
            echo "Environment not ready: dagGcsPrefix is empty/None. Aborting." >&2
            exit 1
          fi
          echo "dag=$DAG_PREFIX" >> "$GITHUB_OUTPUT"
      - name: Stamp deployment metadata
        run: |
          mkdir -p .ci
          printf "repo=%s\nsha=%s\nref=%s\nactor=%s\nwhen=%s\n" \
        if: hashFiles('dags/**') != ''
      - name: Sync plugins (optional)
      # Optional: update PyPI packages for the environment from a file (this restarts components)
      # Provide a file like composer-packages.txt mapping to {package: version}
      #   if: hashFiles('composer-packages.txt') != ''
      #   run: |
      #     gcloud composer environments update "$COMPOSER_ENV" --location "$GCP_REGION" \
      #       --update-pypi-packages-from-file composer-packages.txt

        run: |
          echo "DAGs uploaded to: ${{ steps.composer.outputs.dag }}/${{ env.DAG_SUBFOLDER }}"
          echo "Plugins uploaded to: ${{ steps.composer.outputs.plugins }}/${{ env.DAG_SUBFOLDER }}"      - name: Show locations
      # - name: Update PyPI packages (optional)

            "plugins" "${{ steps.composer.outputs.plugins }}/${{ env.DAG_SUBFOLDER }}"
          gsutil -m rsync -r -x '(^|/)\..*|__pycache__/' -d \
        run: |
        if: hashFiles('plugins/**') != ''

          gsutil -m rsync -r -x '(^|/)\..*|__pycache__/|(^|/)tests(/|$)' -d \
          gsutil cp .ci/deploy.txt "${{ steps.composer.outputs.dag }}/${{ env.DAG_SUBFOLDER }}/.deploy.txt"
            "dags" "${{ steps.composer.outputs.dag }}/${{ env.DAG_SUBFOLDER }}"
        run: |

      - name: Sync DAGs to Composer
            "${{ github.repository }}" "${{ github.sha }}" "${{ github.ref }}" "${{ github.actor }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .ci/deploy.txt
          echo "plugins=$PLUGINS_PREFIX" >> "$GITHUB_OUTPUT"

