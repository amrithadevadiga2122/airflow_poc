name: Deploy Airflow DAGs to Cloud Composer

on:
  push:
    branches: [ main ]
    paths:
      - 'dags/**'
      - 'plugins/**'
      - 'sql/**'
      - '.github/workflows/deploy-composer-dags.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'dags/**'
      - 'plugins/**'
      - 'sql/**'
  workflow_dispatch:
    inputs:
      run_dag_tests:
        description: 'Run airflow dags test for each DAG (experimental)'
        required: false
        default: 'false'

concurrency:
  group: deploy-composer-dags
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint DAGs
        run: |
          flake8 dags || true

  tests:
    runs-on: ubuntu-latest
    env:
      AIRFLOW_VERSION: ${{ vars.AIRFLOW_VERSION || '2.7.3' }}
      PYTHON_VERSION: '3.11'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__SECRETS__BACKENDS: 'airflow.secrets.environment_variables.EnvironmentVariablesBackend'
      AIRFLOW_VAR_GCP_PROJECT_ID: ${{ vars.GCP_PROJECT || 'prj-aidataandanalytics-s-24362' }}
      AIRFLOW_VAR_BQ_DATASET: ${{ vars.BQ_DATASET || 'retail_data_poc' }}
      AIRFLOW_VAR_RAW_BUCKET: ${{ vars.RAW_BUCKET || 'airflow-cicd-poc' }}
      AIRFLOW_VAR_TEMP_BUCKET: ${{ vars.TEMP_BUCKET || 'airflow-cicd-poc-tmp' }}
      AIRFLOW_VAR_GCP_CONN_ID: ${{ vars.GCP_CONN_ID || 'google_cloud_default' }}
      AIRFLOW_VAR_BQ_LOCATION: ${{ vars.BQ_LOCATION || 'us-central1' }}
      AIRFLOW_VAR_DATAPROC_REGION: ${{ vars.DATAPROC_REGION || 'us-central1' }}
      AIRFLOW_VAR_DATAPROC_RUNTIME_VERSION: ${{ vars.DATAPROC_RUNTIME_VERSION || '2.2' }}
      AIRFLOW_VAR_DATAPROC_SERVICE_ACCOUNT: ${{ vars.DATAPROC_SERVICE_ACCOUNT || '726220205777-compute@developer.gserviceaccount.com' }}
      AIRFLOW_VAR_DATAPROC_NETWORK_URI: ${{ vars.DATAPROC_NETWORK_URI || 'projects/prj-aidataandanalytics-s-24362/global/networks/dmi-network' }}
      AIRFLOW_VAR_DATAPROC_SUBNETWORK_URI: ${{ vars.DATAPROC_SUBNETWORK_URI || 'projects/prj-aidataandanalytics-s-24362/regions/us-central1/subnetworks/dmi-network' }}
      AIRFLOW_VAR_SQL_BUCKET: ${{ vars.SQL_BUCKET || vars.RAW_BUCKET || 'airflow-cicd-poc' }}
      AIRFLOW_VAR_SQL_OBJECT: ${{ vars.SQL_OBJECT || 'scripts/filtered.sql' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Apache Airflow (constraints)
        shell: bash
        run: |
          set -euo pipefail
          CONSTRAINTS_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          echo "Using Airflow ${AIRFLOW_VERSION} with constraints ${CONSTRAINTS_URL}"
          python -m pip install --upgrade pip
          pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINTS_URL}"
          pip install "apache-airflow-providers-google" --constraint "${CONSTRAINTS_URL}"
          echo "CONSTRAINTS_URL=${CONSTRAINTS_URL}" >> $GITHUB_ENV

      - name: Install project requirements
        if: hashFiles('requirements.txt') != ''
        run: |
          pip install -r requirements.txt --constraint "${CONSTRAINTS_URL}" || true

      - name: Run unit tests (pytest)
        run: |
          pip install pytest pytest-cov
          pytest -q --maxfail=1 --disable-warnings --cov=dags --cov=plugins --cov-report=xml:coverage.xml

  deploy:
    needs: [lint, tests]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      COMPOSER_ENV: ${{ vars.COMPOSER_ENV }}
      DAG_SUBFOLDER: ${{ vars.DAG_SUBFOLDER || 'airflow_poc' }}
      SQL_BUCKET: ${{ vars.SQL_BUCKET || vars.RAW_BUCKET }}
      SQL_DEST_PREFIX: ${{ vars.SQL_DEST_PREFIX || 'scripts' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          token_format: 'access_token'

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Get Cloud Composer storage prefixes
        id: composer
        shell: bash
        run: |
          set -euo pipefail
          DAG_PREFIX=$(gcloud composer environments describe "$COMPOSER_ENV" --location "$GCP_REGION" --format='value(config.dagGcsPrefix)')
          PLUGINS_PREFIX=$(gcloud composer environments describe "$COMPOSER_ENV" --location "$GCP_REGION" --format='value(config.pluginsGcsPrefix)')
          if [ -z "$DAG_PREFIX" ] || [ "$DAG_PREFIX" = "None" ]; then
            echo "Environment not ready: dagGcsPrefix is empty/None. Aborting." >&2
            exit 1
          fi
          echo "dag=$DAG_PREFIX" >> "$GITHUB_OUTPUT"
          echo "plugins=$PLUGINS_PREFIX" >> "$GITHUB_OUTPUT"

      - name: Show locations
        run: |
          echo "DAGs will be uploaded to: ${{ steps.composer.outputs.dag }}/${{ env.DAG_SUBFOLDER }}"
          echo "Plugins will be uploaded to: ${{ steps.composer.outputs.plugins }}/${{ env.DAG_SUBFOLDER }}"
          if [ -n "${{ env.SQL_BUCKET }}" ]; then
            echo "SQL scripts will be uploaded to: gs://${{ env.SQL_BUCKET }}/${{ env.SQL_DEST_PREFIX }}"
          else
            echo "SQL_BUCKET not set; skipping SQL sync display"
          fi

      - name: Stamp deployment metadata
        if: hashFiles('dags/**') != ''
        shell: bash
        run: |
          mkdir -p .ci
          cat > .ci/deploy.txt <<EOF
          repo=${{ github.repository }}
          sha=${{ github.sha }}
          ref=${{ github.ref }}
          actor=${{ github.actor }}
          when=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Sync plugins (optional)
        if: hashFiles('plugins/**') != ''
        shell: bash
        run: |
          gsutil -m rsync -r -x '(^|/)\..*|__pycache__/|(^|/)tests(/|$)' -d \
            plugins "${{ steps.composer.outputs.plugins }}/${{ env.DAG_SUBFOLDER }}"

      - name: Sync DAGs to Composer
        if: hashFiles('dags/**') != ''
        shell: bash
        run: |
          gsutil -m rsync -r -x '(^|/)\..*|__pycache__/|(^|/)tests(/|$)' -d \
            dags "${{ steps.composer.outputs.dag }}/${{ env.DAG_SUBFOLDER }}"
          gsutil cp .ci/deploy.txt "${{ steps.composer.outputs.dag }}/${{ env.DAG_SUBFOLDER }}/.deploy.txt"

      - name: Sync SQL scripts to GCS (repo sql/ -> gs://SQL_BUCKET/SQL_DEST_PREFIX)
        if: hashFiles('sql/**') != '' && env.SQL_BUCKET != ''
        shell: bash
        run: |
          gsutil -m rsync -r -x '(^|/)\..*|__pycache__/|(^|/)tests(/|$)' -d \
            sql "gs://${{ env.SQL_BUCKET }}/${{ env.SQL_DEST_PREFIX }}"
